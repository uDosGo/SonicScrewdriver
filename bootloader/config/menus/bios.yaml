# SonicScrewloader — Legacy BIOS Boot Menu Configuration
# Applied when platform detection identifies legacy BIOS (non-UEFI)

title: "SonicScrewdriver v2.0.0 (BIOS Mode)"
help_text: "Select an option to boot. Press Enter to confirm."
default_index: 0
timeout_seconds: 15

colors:
  foreground: 7    # White
  background: 0    # Black
  highlight_fg: 0  # Black
  highlight_bg: 7  # White
  title_fg: 14     # Yellow
  title_bg: 4      # Red

entries:
  - label: "Linux Mint 22 (uDos Classic Modern)"
    type: chainload
    path: "\\grub\\boot.img"
    default: true
    requires_bios: true

  - label: "SonicScrewloader (CHASIS Games)"
    type: submenu
    submenu: "chasis"

  - label: "Recovery Tools"
    type: submenu
    submenu: "recovery"

  - label: "Memory Test (MemTest86)"
    type: memtest
    path: "\\memtest86.bin"
    requires_bios: true

  - label: "Reboot System"
    type: reboot
