# SonicScrewloader — PC Boot Menu Configuration
# Applied when platform detection identifies PC hardware (UEFI, non-Apple)

title: "SonicScrewdriver v2.0.0"
help_text: "Select an option to boot. Press Enter to confirm."
default_index: 0
timeout_seconds: 10

colors:
  foreground: 7    # White
  background: 0    # Black
  highlight_fg: 0  # Black
  highlight_bg: 7  # White
  title_fg: 14     # Yellow
  title_bg: 1      # Blue

entries:
  - label: "Linux Mint 22 (uDos Classic Modern)"
    type: chainload
    path: "\\EFI\\grub\\grubx64.efi"
    default: true

  - label: "Windows Recovery"
    type: chainload
    path: "\\EFI\\Microsoft\\Boot\\bootmgfw.efi"
    requires_uefi: true

  - label: "SonicScrewloader (CHASIS Games)"
    type: submenu
    submenu: "chasis"

  - label: "Recovery Tools"
    type: submenu
    submenu: "recovery"

  - label: "Memory Test (MemTest86)"
    type: memtest
    path: "\\EFI\\memtest86.efi"

  - label: "Firmware Setup"
    type: firmware_setup

  - label: "Reboot System"
    type: reboot
