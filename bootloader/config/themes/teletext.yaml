# SonicScrewloader — Teletext Theme Configuration
# Defines the visual appearance of the boot menu

theme_name: "Classic Teletext"
description: "Traditional BBC Ceefax / ORACLE-style teletext aesthetic"

# Color palette (Teletext 16-color mapping)
colors:
  black:   0
  red:     1
  green:   2
  yellow:  3
  blue:    4
  magenta: 5
  cyan:    6
  white:   7

# Screen layout
layout:
  cols: 80
  rows: 25
  title_row: 0
  separator_row: 1
  entries_start_row: 3
  entries_end_row: 21
  footer_separator_row: 22
  help_row: 23
  function_key_row: 24

# Title bar
title:
  foreground: 14    # Yellow
  background: 1     # Blue
  style: "bold"
  separator_char: "━"
  separator_foreground: 7

# Menu entries
entries:
  normal:
    foreground: 7   # White
    background: 0   # Black
  selected:
    foreground: 0   # Black
    background: 7   # White (inverse video)
  number:
    foreground: 3   # Yellow
    style: "bold"
  type_indicator:
    foreground: 6   # Cyan

# Selection indicator
selection:
  character: "▸"
  foreground: 14    # Yellow

# Box drawing
box:
  single:
    horizontal: 0xC4
    vertical: 0xB3
    top_left: 0xDA
    top_right: 0xBF
    bottom_left: 0xC0
    bottom_right: 0xD9
  double:
    horizontal: 0xCD
    vertical: 0xBA
    top_left: 0xC9
    top_right: 0xBB
    bottom_left: 0xC8
    bottom_right: 0xBC

# Footer
footer:
  help_text:
    foreground: 6   # Cyan
    background: 0   # Black
  timeout:
    foreground: 3   # Yellow
    background: 0   # Black
  function_keys:
    foreground: 0   # Black
    background: 7   # White

# Special characters
special:
  checkmark: 0xFB
  crossmark: 0xFD
  arrow_up: 0x18
  arrow_down: 0x19
  arrow_right: 0x1A
  triangle_right: 0x10
  dot_operator: 0xF9
  degree_sign: 0xF8
  music_note: 0x0D
  heart: 0x03
  skull: 0x0E

# Platform indicator
platform_indicator:
  enabled: true
  format: "[{platform}]"
  foreground: 3     # Yellow
  background: 1     # Blue
