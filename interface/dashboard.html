<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonicScrewdriver — Operator Dashboard</title>
  <style>
    :root {
      /* USX tokens v3.0.0 — aligned to @udos/usx-tokens */
      --usx-color-primary: #1976D2;
      --usx-color-on-primary: #FFFFFF;
      --usx-color-success: #4CAF50;
      --usx-color-warning: #FF9800;
      --usx-color-error: #F44336;
      --usx-color-info: #2196F3;
      --usx-color-on-surface: #FFFFFF;
      --surface: #1E1E1E;
      --surface-container: #2D2D2D;
      --surface-container-high: #3A3A3A;
      --border-subtle: #404040;
      --border-strong: #606060;
      --usx-spacing-xs: 2px;
      --usx-spacing-sm: 4px;
      --usx-spacing-md: 8px;
      --usx-spacing-lg: 16px;
      --usx-spacing-xl: 24px;
      --usx-spacing-2xl: 32px;
      --usx-radius-sm: 4px;
      --usx-radius-md: 8px;
      --usx-font-size-caption: 12px;
      --usx-font-size-body: 16px;
      --usx-font-size-headline: 24px;
      --usx-font-family-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --usx-font-weight-regular: 400;
      --usx-font-weight-bold: 700;
      --usx-touch-min: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--usx-font-family-sans);
      font-size: var(--usx-font-size-body);
      font-weight: var(--usx-font-weight-regular);
      color: var(--usx-color-on-surface);
      background: #121212;
      padding: var(--usx-spacing-2xl);
      min-height: 100vh;
    }

    header {
      margin-bottom: var(--usx-spacing-2xl);
    }

    header h1 {
      font-size: var(--usx-font-size-headline);
      font-weight: var(--usx-font-weight-bold);
      color: var(--usx-color-on-surface);
    }

    header p {
      font-size: var(--usx-font-size-caption);
      color: #9E9E9E;
      margin-top: var(--usx-spacing-xs);
    }

    /* -- Status Badges (USX-aligned) -- */
    .status-badge {
      display: inline-block;
      padding: var(--usx-spacing-xs) var(--usx-spacing-sm);
      border-radius: var(--usx-radius-sm);
      font-size: var(--usx-font-size-caption);
      font-weight: var(--usx-font-weight-bold);
      text-transform: uppercase;
    }

    .status-badge.info     { background: var(--usx-color-info);    color: var(--usx-color-on-primary); }
    .status-badge.success  { background: var(--usx-color-success); color: var(--usx-color-on-primary); }
    .status-badge.warning  { background: var(--usx-color-warning); color: #000000; }
    .status-badge.error    { background: var(--usx-color-error);   color: var(--usx-color-on-primary); }

    /* -- Card Component (USX-aligned) -- */
    .card {
      background: var(--surface-container);
      border: 1px solid var(--border-subtle);
      border-radius: var(--usx-radius-md);
      padding: var(--usx-spacing-lg);
      margin-bottom: var(--usx-spacing-lg);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--usx-spacing-md);
      padding-bottom: var(--usx-spacing-md);
      border-bottom: 1px solid var(--border-subtle);
    }

    .card-header h2 {
      font-size: var(--usx-font-size-body);
      font-weight: var(--usx-font-weight-bold);
    }

    /* -- Event Row -- */
    .event-row {
      display: grid;
      grid-template-columns: 160px 120px 1fr 100px;
      gap: var(--usx-spacing-md);
      align-items: center;
      padding: var(--usx-spacing-sm) 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 14px;
    }

    .event-row:last-child { border-bottom: none; }

    .event-timestamp { color: #9E9E9E; font-size: var(--usx-font-size-caption); }
    .event-module   { color: var(--usx-color-info); font-weight: var(--usx-font-weight-bold); }
    .event-message  { color: var(--usx-color-on-surface); }
    .event-tags     { display: flex; gap: var(--usx-spacing-xs); flex-wrap: wrap; }

    .tag {
      background: var(--surface-container-high);
      color: #B0BEC5;
      padding: 1px var(--usx-spacing-sm);
      border-radius: var(--usx-radius-sm);
      font-size: 10px;
      text-transform: uppercase;
    }

    /* -- Summary Grid -- */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--usx-spacing-md);
      margin-bottom: var(--usx-spacing-xl);
    }

    .stat-card {
      background: var(--surface-container);
      border: 1px solid var(--border-subtle);
      border-radius: var(--usx-radius-md);
      padding: var(--usx-spacing-lg);
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: var(--usx-font-weight-bold);
      margin-bottom: var(--usx-spacing-xs);
    }

    .stat-label {
      font-size: var(--usx-font-size-caption);
      color: #9E9E9E;
      text-transform: uppercase;
    }

    .stat-value.ok    { color: var(--usx-color-success); }
    .stat-value.warn  { color: var(--usx-color-warning); }
    .stat-value.err   { color: var(--usx-color-error); }
    .stat-value.info  { color: var(--usx-color-info); }

    /* -- Module Table -- */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: var(--usx-spacing-sm) var(--usx-spacing-md);
      border-bottom: 2px solid var(--border-strong);
      color: #9E9E9E;
      font-weight: var(--usx-font-weight-bold);
      font-size: var(--usx-font-size-caption);
      text-transform: uppercase;
    }

    td {
      padding: var(--usx-spacing-sm) var(--usx-spacing-md);
      border-bottom: 1px solid var(--border-subtle);
    }

    td.module-name { color: var(--usx-color-info); font-weight: var(--usx-font-weight-bold); }
    td.module-count { color: var(--usx-color-on-surface); font-weight: var(--usx-font-weight-bold); }

    .empty-state {
      text-align: center;
      padding: var(--usx-spacing-2xl);
      color: #9E9E9E;
    }

    .empty-state code {
      background: var(--surface-container-high);
      padding: var(--usx-spacing-xs) var(--usx-spacing-sm);
      border-radius: var(--usx-radius-sm);
      font-size: 14px;
      color: var(--usx-color-on-surface);
    }

    button {
      background: var(--usx-color-primary);
      color: var(--usx-color-on-primary);
      border: none;
      border-radius: var(--usx-radius-sm);
      padding: var(--usx-spacing-sm) var(--usx-spacing-lg);
      font-size: var(--usx-font-size-body);
      font-weight: var(--usx-font-weight-bold);
      cursor: pointer;
      min-height: var(--usx-touch-min);
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ SonicScrewdriver</h1>
    <p>Operator Dashboard — Spool Event Viewer & System Health</p>
  </header>

  <div class="summary-grid" id="summary-grid"></div>

  <div class="card">
    <div class="card-header">
      <h2>📊 Recent Spool Events</h2>
      <button onclick="loadEvents()">Refresh</button>
    </div>
    <div id="event-list"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>📦 Top Modules by Volume</h2>
    </div>
    <div id="module-table"></div>
  </div>

  <script>
    // ---- Hardcoded sample data (real dashboard reads from
    //      ~/.local/share/udos/feeds/spool/sonic-events.jsonl
    //      via a small Python/Node bridge API) ----
    const sampleEvents = [
      { timestamp: "2026-07-12T19:20:00+08:00", module: "sonic.usb", level: "INFO",  message: "USB create completed successfully for /dev/sdb", tags: ["usb", "create", "success"] },
      { timestamp: "2026-07-12T19:19:55+08:00", module: "sonic.usb", level: "INFO",  message: "Installing SonicScrewloader to ESP", tags: ["usb", "bootloader", "install"] },
      { timestamp: "2026-07-12T19:19:50+08:00", module: "sonic.usb", level: "INFO",  message: "Formatting partitions", tags: ["usb", "format", "lifecycle"] },
      { timestamp: "2026-07-12T19:19:45+08:00", module: "sonic.usb", level: "INFO",  message: "Partitioning drive (ESP + ext4 + exFAT)", tags: ["usb", "partition", "lifecycle"] },
      { timestamp: "2026-07-12T19:19:40+08:00", module: "sonic.usb", level: "INFO",  message: "USB create requested for /dev/sdb", tags: ["usb", "create", "lifecycle"] },
      { timestamp: "2026-07-12T18:45:10+08:00", module: "sonic.bootloader", level: "INFO", message: "Bootloader installed to /dev/sdc:\\EFI\\sonic", tags: ["bootloader", "install", "success"] },
      { timestamp: "2026-07-12T18:44:55+08:00", module: "sonic.bootloader", level: "INFO", message: "Bootloader install requested: device=/dev/sdc", tags: ["bootloader", "install", "lifecycle"] },
      { timestamp: "2026-07-12T17:30:00+08:00", module: "sonic.security", level: "INFO", message: "Device enrolled: type=fido2", tags: ["security", "enroll", "success"] },
      { timestamp: "2026-07-12T16:15:00+08:00", module: "sonic.diagnostics", level: "INFO", message: "Health check complete (healthy=true)", tags: ["diagnostics", "health", "completed"] },
      { timestamp: "2026-07-12T16:14:00+08:00", module: "sonic.mint", level: "INFO", message: "Mint ISO build completed: sonic-mint.iso", tags: ["mint", "build", "success"] },
      { timestamp: "2026-07-12T15:00:00+08:00", module: "sonic.device", level: "WARNING", message: "Device repurpose: router-001 -> openwrt", tags: ["device", "repurpose", "lifecycle"] },
      { timestamp: "2026-07-12T14:30:00+08:00", module: "skills-mcp", level: "ERROR", message: "MCP tool failed: sonic.device.flash (120ms)", tags: ["mcp", "skill", "execution", "failed"] },
    ];

    function render() {
      const events = sampleEvents;
      if (!events.length) {
        document.getElementById('event-list').innerHTML =
          '<div class="empty-state">No spool events yet. Run <code>sonic usb create</code> to generate events.</div>';
        document.getElementById('module-table').innerHTML = '';
        document.getElementById('summary-grid').innerHTML = '';
        return;
      }

      // Summary stats
      const failures = events.filter(e => e.level === 'ERROR' || e.level === 'CRITICAL').length;
      const warnings = events.filter(e => e.level === 'WARNING').length;
      const healthy  = events.length - failures - warnings;

      document.getElementById('summary-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-value info">${events.length}</div>
          <div class="stat-label">Total Events</div>
        </div>
        <div class="stat-card">
          <div class="stat-value ok">${healthy}</div>
          <div class="stat-label">Healthy</div>
        </div>
        <div class="stat-card">
          <div class="stat-value warn">${warnings}</div>
          <div class="stat-label">Warnings</div>
        </div>
        <div class="stat-card">
          <div class="stat-value err">${failures}</div>
          <div class="stat-label">Errors</div>
        </div>
      `;

      // Event list
      const eventHTML = events.map(e => {
        const badgeClass = e.level === 'ERROR' || e.level === 'CRITICAL' ? 'error'
          : e.level === 'WARNING' ? 'warning'
          : e.level === 'INFO' ? 'info' : 'info';
        return `
          <div class="event-row">
            <span class="event-timestamp">${e.timestamp.slice(0, 19)}</span>
            <span><span class="status-badge ${badgeClass}">${e.level}</span></span>
            <span class="event-message">${e.message}</span>
            <span class="event-tags">${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>
          </div>
        `;
      }).join('');
      document.getElementById('event-list').innerHTML = eventHTML;

      // Module breakdown
      const moduleMap = {};
      events.forEach(e => {
        moduleMap[e.module] = (moduleMap[e.module] || 0) + 1;
      });
      const sorted = Object.entries(moduleMap).sort((a, b) => b[1] - a[1]);
      document.getElementById('module-table').innerHTML = `
        <table>
          <thead><tr><th>Module</th><th>Events</th></tr></thead>
          <tbody>
            ${sorted.map(([mod, count]) => `
              <tr><td class="module-name">${mod}</td><td class="module-count">${count}</td></tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function loadEvents() {
      // In production, fetch from a local bridge API reading the spool JSONL.
      // For now, re-render the sample data with a fresh timestamp simulation.
      render();
    }

    render();
  </script>
</body>
</html>
