name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install CLI
        working-directory: cli
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: cli
        run: python -m pytest tests/ -v
      - name: Validate spool event schema
        working-directory: cli
        run: |
          python -c "
          import json, sys
          from sonic.lib.envelope import SpoolEvent, EventLevel
          e = SpoolEvent(module='ci.test', message='schema validation', level=EventLevel.INFO, tags=['ci', 'test'])
          d = e.to_dict()
          required = {'timestamp', 'level', 'module', 'message', 'tags', 'metadata'}
          missing = required - set(d.keys())
          if missing:
              print(f'SCHEMA DRIFT: Missing keys: {missing}')
              sys.exit(1)
          if d['level'] != 'INFO':
              print(f'SCHEMA DRIFT: Level not serialized: {d[\"level\"]}')
              sys.exit(1)
          print('Spool event schema validated OK')
          "
      - name: Lint spool event format
        working-directory: cli
        run: |
          python -c "
          import json
          from sonic.lib.spool import _spool_path
          path = _spool_path()
          if path.exists():
              with open(path) as f:
                  for i, line in enumerate(f, 1):
                      line = line.strip()
                      if line:
                          try:
                              e = json.loads(line)
                              assert 'timestamp' in e, f'Line {i}: missing timestamp'
                              assert 'module' in e, f'Line {i}: missing module'
                              assert 'level' in e, f'Line {i}: missing level'
                              assert 'message' in e, f'Line {i}: missing message'
                              assert 'tags' in e, f'Line {i}: missing tags'
                          except json.JSONDecodeError as exc:
                              print(f'Line {i}: Invalid JSON: {exc}')
                              continue
          print('Spool journal format lint passed')
          "